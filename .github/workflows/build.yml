name: Build Up!

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "MARKETING_VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_ENV"

      - name: Build
        run: bash build.sh

      - name: Verify app bundle
        run: |
          test -f "build/Up!.app/Contents/MacOS/Up"
          test -f "build/Up!.app/Contents/Resources/AppIcon.icns"
          test -f "build/Up!.app/Contents/Info.plist"
          file "build/Up!.app/Contents/MacOS/Up"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Up!.app
          path: build/Up!.app

      - name: Zip app for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: cd build && zip -r "Up!.app.zip" "Up!.app"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/Up!.app.zip
          generate_release_notes: true
